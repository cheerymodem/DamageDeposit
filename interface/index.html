<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Strict CSP: only same-origin scripts/styles, no inline code, no eval,
         no plugins. Works because ethers is bundled locally and there are no
         inline scripts/handlers. Header-only directives (frame-ancestors,
         HSTS) live in the _headers file for production hosts. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <title>Damage Deposit Control Panel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>Damage Deposit</h1>
        <p class="subtitle">Refundable deposit control panel</p>
      </header>

      <section class="connect-row">
        <button id="connect-wallet-btn" class="btn btn-primary" title="Connect your browser wallet and load the contract at the address below">Connect Wallet</button>
        <span id="wallet-address" class="wallet-chip" hidden></span>
      </section>

      <section class="fields">
        <label class="field">
          <span class="field-label">Contract address</span>
          <input type="text" id="address" placeholder="0x…" autocomplete="off" />
        </label>
      </section>

      <p id="contract-type" class="contract-type" hidden></p>

      <section class="actions">
        <h2 class="actions-title">User actions</h2>
        <div class="btn-group">
          <button id="deposit-btn" class="btn" disabled autocomplete="off" title="Lock the required deposit to register your account">Deposit</button>
          <button id="initiate-btn" class="btn" disabled autocomplete="off" title="Start the withdrawal timelock; you can withdraw once it elapses">Signal Withdrawal</button>
          <button id="withdraw-btn" class="btn" disabled autocomplete="off" title="Reclaim your deposit after the timelock has elapsed">Withdraw</button>
          <button id="contractstatus-btn" class="btn btn-ghost" disabled autocomplete="off" title="Re-read the contract's current state">Refresh Status</button>
        </div>
      </section>

      <output id="output" class="message" aria-live="polite"></output>

      <section class="actions admin" id="admin-section" hidden>
        <h2 class="actions-title">Admin actions</h2>
        <label class="field">
          <span class="field-label">Account address <span class="muted">(target for the actions below)</span></span>
          <input type="text" id="input" placeholder="0x…" autocomplete="off" />
        </label>
        <div class="btn-group">
          <button id="check-btn" class="btn" hidden autocomplete="off" title="Look up the deposit status of the account address above">Check Account</button>
          <button id="adminwithdraw-btn" class="btn" hidden autocomplete="off" title="Refund the account's deposit early, back to the depositor">Admin Withdraw</button>
          <button id="pause-btn" class="btn" hidden autocomplete="off" title="Block new deposits to the contract">Pause Deposits</button>
          <button id="unpause-btn" class="btn" hidden autocomplete="off" title="Allow new deposits again">Unpause Deposits</button>
          <button id="confiscate-btn" class="btn btn-danger" hidden autocomplete="off" title="Seize the account's deposit and send it to the owner">Confiscate Deposit</button>
        </div>
      </section>

      <pre id="status" class="status"></pre>
    </main>

    <script src="./index.js" type="module"></script>
  </body>
</html>
