<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Damage Deposit Control Panel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>Damage Deposit</h1>
        <p class="subtitle">Refundable deposit control panel</p>
      </header>

      <section class="connect-row">
        <button id="connect-wallet-btn" class="btn btn-primary">Connect Wallet</button>
        <span id="wallet-address" class="wallet-chip" hidden></span>
      </section>

      <section class="fields">
        <label class="field">
          <span class="field-label">Contract address</span>
          <input type="text" id="address" placeholder="0x…" autocomplete="off" />
        </label>
      </section>

      <p id="contract-type" class="contract-type" hidden></p>

      <section class="actions">
        <h2 class="actions-title">User actions</h2>
        <div class="btn-group">
          <button id="deposit-btn" class="btn" disabled autocomplete="off">Deposit</button>
          <button id="initiate-btn" class="btn" disabled autocomplete="off">Signal Withdrawal</button>
          <button id="withdraw-btn" class="btn" disabled autocomplete="off">Withdraw</button>
          <button id="contractstatus-btn" class="btn btn-ghost" disabled autocomplete="off">Refresh Status</button>
        </div>
      </section>

      <section class="actions admin" id="admin-section" hidden>
        <h2 class="actions-title">Admin actions</h2>
        <label class="field">
          <span class="field-label">Account address <span class="muted">(target for the actions below)</span></span>
          <input type="text" id="input" placeholder="0x…" autocomplete="off" />
        </label>
        <div class="btn-group">
          <button id="check-btn" class="btn" hidden autocomplete="off">Check Account</button>
          <button id="adminwithdraw-btn" class="btn" hidden autocomplete="off">Admin Withdraw</button>
          <button id="pause-btn" class="btn" hidden autocomplete="off">Pause Deposits</button>
          <button id="unpause-btn" class="btn" hidden autocomplete="off">Unpause Deposits</button>
          <button id="confiscate-btn" class="btn btn-danger" hidden autocomplete="off">Confiscate Deposit</button>
        </div>
      </section>

      <output id="output" class="message" aria-live="polite"></output>
      <pre id="status" class="status"></pre>
    </main>

    <script src="./index.js" type="module"></script>
    <script type="module">
        import {ethers} from './ethers.esm.js';
        window.ethers = ethers;
    </script>
  </body>
</html>
